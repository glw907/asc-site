# asc-site — Cloudflare Workers (SvelteKit adapter-cloudflare)
name = "asc-site"
# Lets cairn-doctor derive the account for its D1 auth-store check.
account_id = "120c269ad6d3dfbe6d63a0bb53758ca0"
compatibility_date = "2026-07-06"
compatibility_flags = ["nodejs_compat"]

main = ".svelte-kit/cloudflare/_worker.js"

# Workers Logs ingests and indexes every console record, including cairn-cms's structured
# diagnostic events (auth, commit, guard). Query them by `event` or `editor` in the dashboard
# Logs tab. See ../cairn-cms/docs/guides/read-cairn-logs.md.
[observability]
enabled = true

# not_found_handling = "none" (the schema's own default, set here explicitly) passes an unmatched
# request through to the Worker instead of serving a static 404 straight from the edge, so
# SvelteKit's built-in default-404 handling renders the themed root src/routes/+error.svelte
# through a real SSR response. See ../cairn-cms/examples/showcase/src/chassis/README.md's "The
# themed-404 pattern".
[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"
not_found_handling = "none"

# cairn-cms: unrestricted Email Sending binding for magic links (arbitrary recipients).
# remote = true so `wrangler dev` sends real mail.
[[send_email]]
name = "EMAIL"
remote = true

# cairn-cms: self-owned magic-link auth store — editor allowlist, sessions, magic tokens.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "cairn-asc-auth"
database_id = "e8ebb275-bd87-4e9f-b1f8-685c460e7629"

# Task 4 (events integration): a read-only binding onto the club's own ops stack D1 (`asc-ops`,
# the same database ops.aksailingclub.org's dashboard writes to). Not this site's database: do not
# add a migration for it here.
#
# READER NOTE (pass 2.1, Task 9 — the dev cutover): this binding is now PRESENT BUT UNUSED. Every
# read that went through it (the home Season section, the /events listing, the .ics feed) repoints
# at CLUB_DB below (src/theme/season-data.ts, src/theme/events-data.ts). The binding stays bound
# rather than deleted so a rollback is a repoint back to EVENTS_DB in those two modules' own
# `platform?.env.*` reads, not a wrangler.toml edit. Do not remove this binding.
[[d1_databases]]
binding = "EVENTS_DB"
database_name = "asc-ops"
database_id = "59a1f106-71f4-4a4c-acbf-c1dba9ed5a16"

# Task 1 (pass 2.1 substrate): the club's own phase-2 domain store, the "asc-club" side of the
# two-database strategy. asc-club is created fresh from the ratified DDL and grows its own
# migrations per pass (this pass's events/classes subset lives in migrations/asc-club/); the
# club's existing system, asc-ops (bound above as EVENTS_DB), is never altered. As of Task 9, this
# is also the site's own live read path for events/season (see the EVENTS_DB comment above).
[[d1_databases]]
binding = "CLUB_DB"
database_name = "asc-club"
database_id = "643edae4-bdc1-42ab-976e-fa014ef2eac1"

# cairn-cms: R2 bucket backing the media library. The /media delivery route streams
# content-addressed image bytes from here; the adapter's assets block names this binding.
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "asc-site-media"

# The job runner's own daily tick (docs/2026-07-07-requirements-adversarial-review.md's
# "structural gap: nothing can act on time"): 08:00 UTC (00:00 Alaska time during daylight saving,
# 23:00 the rest of the year), a quiet hour for both the offer-expiry sweep and the renewal-
# reminder sends. `src/jobs/runner.ts` is the `scheduled()` handler this trigger invokes, wired in
# by `scripts/wire-scheduled-handler.mjs` (see that script's own header for why a post-build
# step, not a `main` override, is the correct mechanism here).
# DISABLED UNTIL THE APEX CUTOVER (Geoff, 2026-07-14). This worker is pre-production: it holds
# the real imported member data, but MW and the legacy stack remain the system of record, so
# nothing here may email members. The 2026-07-14 tick proved the risk: the first run after the
# MW import fired 655 catch-up reminder sends (184 delivered) to real members. The live schedule
# was removed via the API the same day; keeping the trigger out of this file keeps every
# `wrangler deploy` from silently re-creating it. Re-enabling is an explicit `mw-cutover` step,
# and rides on the reminder-blast guard (staleness cutoff + per-tick send cap + renewal-marker
# cycle key) landing first.
# [triggers]
# crons = ["0 8 * * *"]

[vars]
# Canonical origin for magic-link confirmation links, never read from a request header. The dev
# cutover (plan Task 5) repoints the dev.aksailingclub.org Workers custom domain to this Worker;
# production stays untouched. Dev overrides via PUBLIC_ORIGIN in .dev.vars.
PUBLIC_ORIGIN = "https://dev.aksailingclub.org"

# Payments-live-smoke Task 3 (docs/2026-07-15-payments-live-smoke-design.md section 2b): the GA
# Workers rate-limiting binding, one namespace per limit class, `src/theme/rate-limit.ts` the
# shared wrapper every call site reads through. `period` only supports 10 or 60 seconds; every
# cap below is expressed against 60. `namespace_id` is an arbitrary string unique within this
# Worker (not a pre-provisioned resource, unlike a D1 database id). Absent locally and in
# vitest, which is the intended degrade-to-open case (see rate-limit.ts's own header). Values
# are conservative first passes; they tune post-smoke.

# The tightest cap: public checkout-creating forms (payClassFee, createDonationCheckout,
# applyJoin's fresh-join checkout). 5 requests per key per 60s.
[[ratelimits]]
name = "RATE_LIMIT_MONEY"
namespace_id = "10061"
simple = { limit = 5, period = 60 }

# The rest of the public unauthenticated POST surface: joinClass, sendMessage, requestRenewLink,
# requestLink (the /my-account signed-out sign-in send), the offer claim/decline actions, and
# confirm/resend. 15 requests per key per 60s.
[[ratelimits]]
name = "RATE_LIMIT_PUBLIC_POST"
namespace_id = "10062"
simple = { limit = 15, period = 60 }

# Authenticated member POSTs (portalAction: CSRF plus a live member session), keyed per member
# session id. A signed-in member legitimately clicks several buttons in a visit, so this is more
# generous than the public caps. 30 requests per key per 60s.
[[ratelimits]]
name = "RATE_LIMIT_MEMBER"
namespace_id = "10063"
simple = { limit = 30, period = 60 }

# Admin POSTs (clubAdminAction: the engine's auth guard plus the club-role gate), keyed per
# editor email. Board volunteers run legitimate bulk operations (a class roster edit, a batch of
# signups), so this stays the most generous authenticated cap. 60 requests per key per 60s.
[[ratelimits]]
name = "RATE_LIMIT_ADMIN"
namespace_id = "10064"
simple = { limit = 60, period = 60 }

# Public enumeration-capable GET probes (checkKnownEmail, checkClassEligibility), keyed per IP
# and per probed email, to blunt a scripted sweep of the member roster without blocking the
# normal one-check-per-blur a real visitor's form triggers. 20 requests per key per 60s.
[[ratelimits]]
name = "RATE_LIMIT_ENUMERATION"
namespace_id = "10065"
simple = { limit = 20, period = 60 }
