name: CI

# The standing quality gate: svelte-check, vitest, the build, and the pixel-diff visual-fidelity
# rider (plan Task 5). Separate from deploy.yml, which only runs on a push to main and never
# blocks on these checks itself; this workflow is the one a pull request actually gates on.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Regenerate the site-visual baseline snapshots instead of asserting against them
        type: boolean
        default: false

jobs:
  ci:
    runs-on: ubuntu-latest
    # Only the manual regen dispatch needs to push a commit back to the branch it ran against;
    # the routine push/pull_request runs never reach that step.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - name: Run the visual-fidelity suite
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots == 'true') }}
        run: npm run test:e2e
      # Manual regen mode: a dispatcher ticks `update_snapshots` after a deliberate rendering
      # change. Runs the visual spec by its file path (never a title grep, which silently skips
      # any test whose name doesn't match), on the CI runner itself, since baselines are
      # CI-canonical and a workstation render is never an acceptable substitute. Commits the
      # changed PNGs straight back to the branch the dispatch ran against, the same
      # checkout-commit-push shape as aksailingclub-legacy's sync-editors.yml.
      - name: Regenerate the visual baseline snapshots
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots == 'true' }}
        run: npm run test:e2e -- e2e/site-visual.spec.ts --update-snapshots
      - name: Commit the regenerated visual baselines
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.update_snapshots == 'true' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add e2e/site-visual.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore(e2e): regenerate the site-visual baselines"
            git push
          fi
